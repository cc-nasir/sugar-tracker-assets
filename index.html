<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Repository</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          margin: 40px;
          line-height: 1.6;
        }
        h1 {
          color: #333;
        }
        a {
          display: block;
          margin: 8px 0;
          color: #1a73e8;
          text-decoration: none;
        }
        a:hover {
          text-decoration: underline;
        }
        .box {
          padding: 15px;
          border: 1px solid #ddd;
          border-radius: 8px;
          max-width: 500px;
        }
    </style>
</head>
<body>

<h1>📁 Asset Repository</h1>

<div class="box">
    <p>This repository contains static assets used in the project.</p>

    <h3>🖼 Images</h3>
    <a href="./posts/images/">Open /posts/images/</a>

    <h3>🎬 Videos</h3>
    <a href="./posts/videos/">Open /posts/videos/</a>

    <hr />

    <p><strong>Direct Access Paths:</strong></p>
    <code>/posts/images/</code><br />
    <code>/posts/videos/</code>
</div>

</body>
</html>
